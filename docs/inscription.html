<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription - Gestion des Cotisations</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html { scroll-behavior: smooth; } body { font-family: -apple-system, Arial, sans-serif; background:#f3f2ee; }
  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background:#fff; } @media (min-width:768px){ .app{ max-width:720px; } } @media (min-width:1024px){ .app{ max-width:960px; } }
</style>
</head>
<body>
<div class="app px-6 py-8 max-w-sm md:max-w-sm mx-auto">

  <div class="flex items-center mb-6">
    <a href="index.html" class="mr-2 text-gray-500">&larr;</a>
    <h1 class="font-bold text-lg">Créer un compte</h1>
  </div>

  <p class="text-sm text-gray-500 mb-6">Inscris-toi pour suivre tes cotisations hebdomadaires et les campagnes de la classe.</p>

  <form class="space-y-3">
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="text-xs text-gray-500 block mb-1">Prénom</label>
        <input type="text" placeholder="Mamadou" class="w-full border rounded-lg px-3 py-2.5 text-sm">
      </div>
      <div>
        <label class="text-xs text-gray-500 block mb-1">Nom</label>
        <input type="text" placeholder="Ndiaye" class="w-full border rounded-lg px-3 py-2.5 text-sm">
      </div>
    </div>
    <div>
      <label class="text-xs text-gray-500 block mb-1">Email</label>
      <input type="email" placeholder="nom@exemple.com" class="w-full border rounded-lg px-3 py-2.5 text-sm">
    </div>
    <div>
      <label class="text-xs text-gray-500 block mb-1">Téléphone</label>
      <input type="tel" placeholder="77 000 00 00" class="w-full border rounded-lg px-3 py-2.5 text-sm">
    </div>
    <div>
      <label class="text-xs text-gray-500 block mb-1">Mot de passe</label>
      <input type="password" placeholder="8 caractères minimum" class="w-full border rounded-lg px-3 py-2.5 text-sm">
    </div>
    <div>
      <label class="text-xs text-gray-500 block mb-1">Confirmer le mot de passe</label>
      <input type="password" placeholder="••••••••" class="w-full border rounded-lg px-3 py-2.5 text-sm">
    </div>

    <label class="flex items-start gap-2 text-xs text-gray-500 pt-1">
      <input type="checkbox" class="mt-0.5">
      J'accepte de participer aux cotisations hebdomadaires et ponctuelles de la classe.
    </label>

    <a href="apprenant.html" class="block w-full bg-gray-900 text-white text-center rounded-lg py-2.5 text-sm font-medium mt-2">Créer mon compte</a>
  </form>

  <p class="text-center text-sm text-gray-500 mt-6">
    Déjà inscrit ? <a href="index.html" class="text-gray-900 font-medium">Se connecter</a>
  </p>

  <div class="border-t mt-8 pt-4">
    <p class="text-[11px] text-gray-400 text-center">Le Gérant peut aussi t'ajouter manuellement ou via import Excel/CSV.</p>
  </div>

</div>
</body>
</html>
